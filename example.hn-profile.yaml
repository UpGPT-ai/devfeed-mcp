# ~/.hn-profile.yaml — Your HN interests file
# Copy this to ~/.hn-profile.yaml and customize it.

# Your HN username (used for reply notifications and activity)
username: your-hn-username

# Topics you care about (used for digest filtering)
topics:
  - ai-agents
  - developer-tools
  - open-source
  - saas
  - startup-bootstrapping
  - chrome-extensions
  - supply-chain-security

# Specific keywords to match in story titles and URLs
keywords:
  - "Claude Code"
  - "MCP server"
  - "vibe coding"
  - TypeScript
  - Supabase
  - WordPress

# HN users whose activity you want to follow
follow:
  - tptacek
  - patio11
  - dang

# Threads you're watching (managed via hn_watch tool, but you can add IDs here too)
watching: []
